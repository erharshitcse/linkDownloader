<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-600">TeraBox & DiskWala DL</h1>
        <input id="linkInput" type="text" placeholder="Paste link here..." class="w-full p-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <button onclick="download()" id="btn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">Get Download Link</button>
        
        <div id="loader" class="hidden mt-4 text-center text-gray-500">Processing...</div>
        
        <div id="result" class="hidden mt-6 p-4 border-t">
            <p id="title" class="font-bold text-gray-800 truncate"></p>
            <p id="size" class="text-sm text-gray-500 mb-4"></p>
            <a id="dlLink" href="#" target="_blank" class="block text-center bg-green-500 text-white py-2 rounded-lg hover:bg-green-600">Download Video</a>
        </div>
    </div>

    <script>
        async function download() {
            const url = document.getElementById('linkInput').value;
            const btn = document.getElementById('btn');
            const result = document.getElementById('result');
            const loader = document.getElementById('loader');

            if(!url) return alert("Please paste a link!");

            loader.classList.remove('hidden');
            result.classList.add('hidden');

            try {
                const res = await fetch(`/api/extract?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                
                if(data.status === "success") {
                    document.getElementById('title').innerText = data.title;
                    document.getElementById('size').innerText = "Size: " + data.size;
                    document.getElementById('dlLink').href = data.link;
                    result.classList.remove('hidden');
                } else {
                    alert("Error: " + data.message);
                }
            } catch (e) {
                alert("Server error. Make sure backend is running.");
            } finally {
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
